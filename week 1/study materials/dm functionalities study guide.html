<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Mining Functionalities — Study Sheet</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #1f2937;
      --muted: #4b5563;
      --card: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --red: #fee2e2;
      --red-b: #ef4444;
      --orange: #ffedd5;
      --orange-b: #f97316;
      --yellow: #fef3c7;
      --yellow-b: #f59e0b;
      --green: #dcfce7;
      --green-b: #22c55e;
      --teal: #ccfbf1;
      --teal-b: #14b8a6;
      --blue: #dbeafe;
      --blue-b: #3b82f6;
      --indigo: #e0e7ff;
      --indigo-b: #6366f1;
      --purple: #f3e8ff;
      --purple-b: #a855f7;
      --pink: #fce7f3;
      --pink-b: #ec4899;
      --gray: #f3f4f6;
      --gray-b: #6b7280;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      background: linear-gradient(135deg, #111827, #2563eb);
      color: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
    }
    .hero p {
      margin: 0;
      color: #e5edff;
      font-size: 1rem;
    }
    .memory-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 18px 0 22px;
    }
    .mini {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      font-size: 0.95rem;
    }
    .mini strong { display: block; margin-bottom: 6px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .head {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 10px;
      border: 2px solid transparent;
    }
    .red { background: var(--red); border-color: var(--red-b); }
    .orange { background: var(--orange); border-color: var(--orange-b); }
    .yellow { background: var(--yellow); border-color: var(--yellow-b); }
    .green { background: var(--green); border-color: var(--green-b); }
    .teal { background: var(--teal); border-color: var(--teal-b); }
    .blue { background: var(--blue); border-color: var(--blue-b); }
    .indigo { background: var(--indigo); border-color: var(--indigo-b); }
    .purple { background: var(--purple); border-color: var(--purple-b); }
    .pink { background: var(--pink); border-color: var(--pink-b); }
    .gray { background: var(--gray); border-color: var(--gray-b); }

    .prompt {
      font-weight: 700;
      margin: 8px 0 6px;
    }
    .muted {
      color: var(--muted);
    }
    ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }
    li { margin: 4px 0; }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      margin-top: 8px;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f8fafc; }
    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      font-size: 0.85rem;
      margin-right: 6px;
      margin-top: 6px;
    }
    @media (max-width: 900px) {
      .grid, .footer-grid, .memory-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Data Mining Functionalities</h1>
      <p>Color-coded study sheet for fast review: what each functionality does, what question it answers, and when to use it.</p>
    </section>

      <div class="mini"><strong>Summarize</strong> OLAP</div>
